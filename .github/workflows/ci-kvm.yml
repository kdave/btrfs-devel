name: CI KVM test caching

on:
  push:
    branches: [ "ci-kvm-caching" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Update package cache
      run: sudo apt-get update -y
    - name: Install build and runtime dependencies
      run: sudo apt-get install -y bc gawk gcc git indent make sed flex bison libelf-dev udev virtme-ng
    - name: Restore build cache
      id: cache-build
      uses: actions/cache@v5
      with:
        path: "/home/runner/build"
        key: kernel-build
    - name: Build kernel (optional)
      run: |
        ls -lR $HOME/build
        exit 1
        vng --verbose --kconfig O=$HOME/build
        make localmodconfig
        cat .github/workflows/kconfig.btrfs .github/workflows/kconfig.fstests >> .config
        yes '' | make oldconfig
        make -j 4 O=$HOME/build kernel/
